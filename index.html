function getTokens() {
    const now   = new Date();
    const chile = new Date(now.toLocaleString('en-US', { timeZone: 'America/Santiago' }));
    const h     = chile.getHours();
    const day   = chile.getDay();
    const fmt   = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    let currentStr, prevStr, isNoche = false, isMiercolesDia = false;
    if (h >= 8 && h < 20) {
        currentStr = `${fmt(chile)}-DIA`;
        const prev = new Date(chile); prev.setDate(chile.getDate() - 1);
        prevStr = `${fmt(prev)}-NOCHE`;
        if (day === 3) isMiercolesDia = true;
    } else {
        isNoche = true;
        const base = h < 8 ? (()=>{ const d=new Date(chile); d.setDate(chile.getDate()-1); return d; })() : chile;
        currentStr = `${fmt(base)}-NOCHE`;
        prevStr    = `${fmt(base)}-DIA`;
    }
    return { currentStr, prevStr, isNoche, isMiercolesDia };
}

// Badge de valor anterior (turno previo)
const Fantasma = ({ valor }) =>

// Toast system
function useToast() {
    const [toasts, setToasts] = useState([]);
    const push = useCallback((msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
    }, []);
    const ToastContainer = () => (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none">
            {toasts.map(t => (
                <div key={t.id} className={`fade-in px-5 py-3 rounded-2xl text-sm font-bold shadow-xl text-white ${t.type==='error'?'bg-red-600':t.type==='success'?'bg-aguas-green':'bg-aguas-dark'}`}>{t.msg}</div>
            ))}
        </div>
    );
    return { push, ToastContainer };
}

// MULTI-FOTO UPLOADER
// ─────────────────────────────────────────────
function MultiFotoUploader({ idCampo, turnoId, onFotosActualizadas, fotosIniciales = [] }) {
    const [fotos, setFotos]         = useState(fotosIniciales);
    const [subiendoIdx, setSubiendoIdx] = useState(null);
    const blobRefs = useRef([]);
    useEffect(() => () => blobRefs.current.forEach(u => URL.revokeObjectURL(u)), []);

    const manejarCaptura = e => {
        const f = e.target.files[0];
        if (!f || fotos.length >= 3) return;
        const url = URL.createObjectURL(f);
        blobRefs.current.push(url);
        setFotos(p => [...p, { localUrl: url, realFile: f, remoteUrl: null }]);
    };

    const subirFoto = async index => {
        const foto = fotos[index];
        if (!foto.realFile || foto.remoteUrl) return;
        setSubiendoIdx(index);
        const ext    = foto.realFile.name.split('.').pop();
        const nombre = `${turnoId}-${idCampo}-${index}-${Date.now()}.${ext}`;
        const { error } = await sb.storage.from('inspeccion_fotos').upload(nombre, foto.realFile);
        if (!error) {
            const { data } = sb.storage.from('inspeccion_fotos').getPublicUrl(nombre);
            setFotos(p => {
                const c = [...p];
                c[index] = { ...c[index], remoteUrl: data.publicUrl };
                onFotosActualizadas(idCampo, c.map(f => f.remoteUrl).filter(Boolean));
                return c;
            });
        }
        setSubiendoIdx(null);
    };

    const eliminarFoto = index => {
        setFotos(p => {
            const c = p.filter((_, i) => i !== index);
            onFotosActualizadas(idCampo, c.map(f => f.remoteUrl).filter(Boolean));
            return c;
        });
    };

    return (
        <div className="mt-3">
            <div className="grid grid-cols-3 gap-2">
                {fotos.map((foto, i) => (
                    <div key={i} className="relative">
                        <img src={foto.localUrl || foto.remoteUrl} className="h-24 w-full object-cover rounded-lg border-2 border-white shadow-sm" alt="" />
                        {!foto.remoteUrl && subiendoIdx !== i && (
                            <button onClick={() => subirFoto(i)} className="absolute inset-0 bg-black/40 flex items-center justify-center rounded-lg">
                                <span className="bg-aguas-green text-white text-[10px] font-bold px-2 py-1 rounded">SUBIR</span>
                            </button>
                        )}
                        {subiendoIdx === i && (
                            <div className="absolute inset-0 bg-white/60 flex items-center justify-center rounded-lg">
                                <div className="w-5 h-5 border-2 border-aguas-blue border-t-transparent rounded-full spin"></div>
                            </div>
                        )}
                        {foto.remoteUrl && (
                            <div className="absolute top-1 right-1 bg-aguas-green text-white rounded-full p-0.5">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg>
                            </div>
                        )}
                        <button onClick={() => eliminarFoto(i)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center font-bold text-sm shadow-lg">×</button>
                    </div>
                ))}
                {fotos.length < 3 && (
                    <label className="h-24 border-2 border-dashed border-aguas-blue bg-blue-50/50 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-blue-100 transition-colors">
                        <span className="text-2xl text-aguas-blue">+</span>
                        <span className="text-[9px] font-bold text-aguas-blue uppercase">Foto {fotos.length + 1}</span>
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={manejarCaptura} />
                    </label>
                )}
            </div>
        </div>
    );
}

// LOGIN

function PantallaLogin({ onLogin }) {
    const [email, setEmail]     = useState('');
    const [pass, setPass]       = useState('');
    const [loading, setLoading] = useState(false);
    const [showPw, setShowPw]   = useState(false);
    const [error, setError]     = useState('');

    const submit = async e => {
        e.preventDefault(); setLoading(true); setError('');
        const { data, error: err } = await sb.auth.signInWithPassword({ email, password: pass });
        if (err)          { setError(err.message.includes('Invalid login') ? 'Correo o contraseña incorrectos.' : err.message); setLoading(false); }
        else if (data.session) onLogin(data.session.user);
        else              { setError('Error al establecer sesión.'); setLoading(false); }
    };

    return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
            <div className="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border-t-8 border-aguas-blue fade-in">
                <div className="flex flex-col items-center mb-8">
                    <div className="w-16 h-16 bg-aguas-blue rounded-2xl flex items-center justify-center shadow-lg mb-4">
                        <span className="font-black text-white text-3xl tracking-tight" style={{fontFamily:'Lato,sans-serif',fontWeight:900}}>RS</span>
                    </div>
                    <h1 className="text-2xl font-black text-aguas-dark">RondaSync</h1>
                    <p className="text-[10px] text-aguas-green font-bold uppercase tracking-[0.3em] mt-1">PTAS Talagante</p>
                </div>
                <form onSubmit={submit} className="space-y-5">
                    {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-xs font-bold text-center">⚠️ {error}</div>}
                    <div>
                        <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Correo</label>
                        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 focus:border-aguas-blue outline-none text-sm" required />
                    </div>
                    <div className="relative">
                        <label className="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Contraseña</label>
                        <input type={showPw?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 pr-12 focus:border-aguas-blue outline-none text-sm" required />
                        <button type="button" onClick={()=>setShowPw(!showPw)} className="absolute right-4 top-9 text-gray-400 hover:text-aguas-blue text-lg outline-none">{showPw?'🙈':'👁️'}</button>
                    </div>
                    <button type="submit" disabled={loading} className="w-full bg-aguas-blue text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg hover:bg-aguas-dark active:scale-95 transition-all mt-2 disabled:opacity-60 text-sm">
                        {loading ? 'Verificando...' : 'Iniciar Sesión'}
                    </button>
                </form>
            </div>
        </div>
    );
}

function FormularioArea60({ turnoId, prevData, onTerminado }) {
    const [fd, setFd] = useState({
        temp_in:'', temp_out:'', temp_agua_in:'', temp_agua_out:'',
        bombas:'Optimo',
        caldera_op:'A', atomizadores:'1', pres_sal_cald:'', pres_sal_recirc:'',
        nivel_estanque:'', pres_nitrogeno:'',
        compresor:'A', aceite:'', filtro_ok:true, trampa:'OK', purga_ace:true,
        soplador:'A', pres_soplador:'', caudal_caldera:'',
        observaciones:''
    });
    const [fotos, setFotos] = useState({});
    const mf  = (c,u) => setFotos(p=>({...p,[c]:u}));
    const set = (k,v) => setFd(p=>({...p,[k]:v}));

    const tIn=parseFloat(fd.temp_in), tOut=parseFloat(fd.temp_out);
    const deltaT = (fd.temp_in && fd.temp_out) ? Math.abs(tIn-tOut).toFixed(1) : '--';
    const aceite=parseFloat(fd.aceite), nivel=parseFloat(fd.nivel_estanque);

    const alTIn    = fd.temp_in!=='' && tIn<=34;
    const alTOut   = fd.temp_out!=='' && tOut>=35.5;
    const alAceite = fd.aceite!=='' && aceite<50;
    const alNivEst = fd.nivel_estanque!=='' && (nivel<70||nivel>90);

    const reqObs = fd.bombas!=='Optimo' || alTIn || alTOut || alAceite ||
                   alNivEst || !fd.filtro_ok || fd.trampa!=='OK' || !fd.purga_ace;

    const oblig = ['a60_inter','a60_calderas','a60_compresores'];
    const canSubmit = oblig.every(c=>fotos[c]?.length>0) &&
        fd.temp_in && fd.temp_out && fd.pres_sal_cald && fd.nivel_estanque &&
        fd.aceite && fd.pres_soplador && fd.caudal_caldera &&

                        ['temp_agua_in','T° Agua Entrada','temp_agua_entrada_c',false,''],
                        ['temp_agua_out','T° Agua Salida','temp_agua_salida_c',false,''],

                        <div key={k}>
                            <div className="flex justify-between mb-1"><label className="text-[9px] font-bold uppercase">{lbl}</label><Fantasma valor={prevData?.[pk]}/></div>

function VistaTraspaso({ prevTurno, prevGasometro, prevDigestor, prevCompresores, prevCalderas, prevAntorchas, prevA50, prevA60, prevA70, onBack }) {
    if (!prevTurno) return (
        <div className="p-4 max-w-md mx-auto min-h-screen fade-in">
            <div className="bg-white p-6 rounded-3xl shadow-sm text-center border mt-10">
                <p className="font-bold text-gray-400 text-sm">No hay datos del turno anterior.</p>
                <button onClick={onBack} className="mt-6 bg-aguas-blue text-white px-6 py-3 rounded-xl font-black uppercase text-sm">Volver</button>
            </div>
        </div>
    );

    const anomalias = [];
    const chk = (cond, msg) => { if(cond) anomalias.push(msg); };
    if (prevGasometro) {
        chk(prevGasometro.estado_anclajes && prevGasometro.estado_anclajes!=='Optimo', `Gasómetro: Anclajes ${prevGasometro.estado_anclajes}`);
        chk(prevGasometro.lectura_lel_porcentaje>0, `Gasómetro: LEL ${prevGasometro.lectura_lel_porcentaje}%`);
        chk(prevGasometro.nivel_guarda_hidraulica && prevGasometro.nivel_guarda_hidraulica!=='Nivel Normal', `Gasómetro: Guarda ${prevGasometro.nivel_guarda_hidraulica}`);
        chk(prevGasometro.estado_gabinete_electrico && !prevGasometro.estado_gabinete_electrico.includes('Operativo'), `Gasómetro: Gabinete Falla`);
    }
    if (prevDigestor) {
        chk(prevDigestor.estado_escotillas!=='Optimo (Sin fugas)', `Digestor: ${prevDigestor.estado_escotillas}`);
        chk(prevDigestor.estado_valvulas!=='Optimo', `Digestor: Válvulas ${prevDigestor.estado_valvulas}`);
        chk(prevDigestor.estado_purgas!=='Operativa (Sin obstrucciones)', `Digestor: ${prevDigestor.estado_purgas}`);
    }
    if (prevCompresores) chk(prevCompresores.estado_compresores!=='Optimo', `Compresores: ${prevCompresores.estado_compresores}`);
    if (prevCalderas)    chk(prevCalderas.estado_quemador!=='Optimo', `Calderas: Quemador ${prevCalderas.estado_quemador}`);
    if (prevAntorchas)   chk(prevAntorchas.estado_quemador!=='Optimo', `Antorchas: ${prevAntorchas.estado_quemador}`);
    if (prevA50) {
        chk(prevA50.altura_lodo_cm>120, `Área 50: Manto Lodo Alto (${prevA50.altura_lodo_cm}cm)`);
        chk(prevA50.presion_balon_bar<3, `Área 50: Presión Balón Baja (${prevA50.presion_balon_bar}bar)`);
    }
    if (prevA60) {
        chk(prevA60.temp_lodo_entrada_c<=34, `Área 60: T° Entrada Baja (${prevA60.temp_lodo_entrada_c}°C)`);
        chk(prevA60.temp_lodo_salida_c>=35.5, `Área 60: T° Salida Alta (${prevA60.temp_lodo_salida_c}°C)`);
    }
    if (prevA70) {
        chk(prevA70.torque<33||prevA70.torque>45, `Área 70: Torque Anormal (${prevA70.torque}%)`);
        chk(prevA70.velocidad_relativa<2.5||prevA70.velocidad_relativa>6.5, `Área 70: Vel. Relativa Anormal (${prevA70.velocidad_relativa})`);
        chk(prevA70.nivel_polipack<50, `Área 70: Polipack Bajo (${prevA70.nivel_polipack}%)`);
    }

    const obsList = [
        {area:'Gasómetro',text:prevGasometro?.observaciones},{area:'Digestor',text:prevDigestor?.observaciones},
        {area:'Compresores',text:prevCompresores?.observaciones},{area:'Calderas',text:prevCalderas?.observaciones},
        {area:'Antorchas',text:prevAntorchas?.observaciones},{area:'Área 50',text:prevA50?.observaciones},
        {area:'Área 60',text:prevA60?.observaciones},{area:'Área 70',text:prevA70?.observaciones},
    ].filter(o=>o.text?.trim());

    return (
        <div className="p-4 max-w-md mx-auto min-h-screen pb-10 space-y-4 fade-in">
            <div className="bg-aguas-blue p-5 rounded-2xl text-white shadow-xl flex justify-between items-center sticky top-0 z-20">
                <div className="flex items-center gap-3"><span className="text-2xl">📋</span><h2 className="text-lg font-black uppercase">Traspaso de Turno</h2></div>
                <button onClick={onBack} className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold hover:bg-white/30">Volver</button>
            </div>
            <div className="bg-white rounded-3xl p-5 shadow-sm border flex justify-between items-center">
                <div>
                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Operador Saliente</p>
                    <p className="text-sm font-bold text-gray-800">{prevTurno.operador_nombre}</p>
                    <p className="text-[10px] text-gray-400 mt-1">{new Date(prevTurno.created_at).toLocaleString('es-CL')}</p>
                </div>
                <span className={`text-[9px] font-black uppercase px-3 py-1 rounded-full border ${prevTurno.tipo_turno==='Día'?'bg-blue-50 text-aguas-blue border-blue-200':'bg-indigo-50 text-indigo-700 border-indigo-200'}`}>{prevTurno.tipo_turno}</span>
            </div>
            {prevTurno.setpoints_ajustados && (
                <div className="bg-blue-50 rounded-3xl p-5 shadow-sm border border-blue-200">
                    <h3 className="text-[10px] font-black text-aguas-blue uppercase tracking-widest mb-2">⚙️ Ajustes Operacionales</h3>
                    <p className="text-sm text-blue-900 font-medium italic">"{prevTurno.setpoints_ajustados}"</p>
                </div>
            )}
            {anomalias.length > 0 ? (
                <div className="bg-red-50 rounded-3xl p-5 shadow-sm border border-red-200">
                    <h3 className="text-[10px] font-black text-red-700 uppercase tracking-widest mb-3 flex items-center gap-2"><span>⚠️</span>{anomalias.length} Alertas Detectadas</h3>
                    <ul className="space-y-2">{anomalias.map((a,i)=><li key={i} className="text-xs text-red-700 font-bold bg-white p-2 rounded-xl border border-red-100">• {a}</li>)}</ul>
                </div>
            ) : (
                <div className="bg-emerald-50 rounded-3xl p-5 shadow-sm border border-emerald-200 flex items-center gap-3">
                    <span className="text-2xl">✅</span>
                    <p className="text-sm font-black text-emerald-800">Turno anterior sin anomalías</p>
                </div>
            )}
            {obsList.length > 0 && (
                <div className="bg-amber-50 rounded-3xl p-5 shadow-sm border border-amber-200">
                    <h3 className="text-[10px] font-black text-amber-700 uppercase tracking-widest mb-3">📝 Observaciones de Terreno</h3>
                    <div className="space-y-3">
                        {obsList.map((o,i) => (
                            <div key={i} className="bg-white p-3 rounded-xl border border-amber-100">
                                <p className="text-[9px] font-black text-amber-600 uppercase">{o.area}</p>
                                <p className="text-xs text-amber-900 font-medium italic mt-1">"{o.text}"</p>
                            </div>
                        ))}
                    </div>
                </div>
            )}
            <div className="bg-white rounded-3xl p-5 shadow-sm border">
                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4 border-b pb-2">SCADA del Turno Saliente</h3>
                <div className="grid grid-cols-3 gap-2">
                    {[
                        {l:'Nivel Dig.', v:prevTurno.scada_dig_nivel_cm,        u:'cm',  bg:'bg-gray-50'},
                        {l:'Pres. Dig.', v:prevTurno.scada_dig_presion_mbar,    u:'mb',  bg:'bg-gray-50'},
                        {l:'Temp Dig.',  v:prevTurno.scada_dig_temp_c,          u:'°C',  bg:'bg-gray-50'},
                        {l:'Nivel Gas.', v:prevTurno.scada_nivel_gasometro,     u:'%',   bg:'bg-amber-50'},
                        {l:'Pres. Gas.', v:prevTurno.scada_presion_mbar,        u:'mb',  bg:'bg-amber-50'},
                        {l:'Flujo Comp.',v:prevTurno.scada_flujo_biogas_nm3h,   u:'',    bg:'bg-gray-50'},
                        {l:'Pres. Imp.', v:prevTurno.scada_comp_presion_imp_mbar,u:'mb', bg:'bg-gray-50'},
                        {l:'Flujo Cald.',v:prevTurno.scada_cald_flujo_m3h,      u:'',    bg:'bg-gray-50'},
                        {l:'Flujo Ant.', v:prevTurno.scada_ant_flujo_m3h,       u:'',    bg:'bg-gray-50'},
                    ].map(({l,v,u,bg},i)=>(
                        <div key={i} className={`${bg} p-2 rounded-xl text-center`}>
                            <span className="text-gray-400 block text-[9px] font-bold uppercase mb-1">{l}</span>
                            <span className="font-black text-gray-800 text-sm">{v??'—'}{v&&u?' '+u:''}</span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

// ─────────────────────────────────────────────
// APP PRINCIPAL
// ─────────────────────────────────────────────
function App() {
    const [user,setUser]                     = useState(null);
    const [authChecking,setAuthChecking]     = useState(true);
    const [vista,setVista]                   = useState('hub');
    const [moduloDestino,setModuloDestino]   = useState(null);
    const [isSaving,setIsSaving]             = useState(false);
    const [syncInProgress,setSyncInProgress] = useState(false);
    const { push:toast, ToastContainer }     = useToast();

    const { currentStr, prevStr, isNoche, isMiercolesDia } = getTokens();
    const [shiftToken] = useState(currentStr);
    const [prevToken]  = useState(prevStr);

    const [currentScada,setCurrentScada] = useState(null);
    const [currentGas,setCurrentGas]     = useState(null);
    const [currentDig,setCurrentDig]     = useState(null);
    const [currentComp,setCurrentComp]   = useState(null);
    const [currentCald,setCurrentCald]   = useState(null);
    const [currentAnt,setCurrentAnt]     = useState(null);
    const [currentA50,setCurrentA50]     = useState(null);
    const [currentA60,setCurrentA60]     = useState(null);
    const [currentA70,setCurrentA70]     = useState(null);
    const [currentEnt,setCurrentEnt]     = useState(null);
    const [currentTot,setCurrentTot]     = useState(null);
    const [currentGen,setCurrentGen]     = useState(null);
    const [prevData,setPrevData]         = useState({});

    const cargarDatos = useCallback(async (silencioso=false) => {
        if (!silencioso) setSyncInProgress(true);
        try {
            const tablas = ['registro_turnos','inspeccion_gasometro','inspeccion_digestor','inspeccion_compresores','inspeccion_calderas','inspeccion_antorchas','inspeccion_area50','inspeccion_area60','inspeccion_area70','inspeccion_entrega','inspeccion_totalizadores','inspeccion_generador'];
            const queries = tablas.flatMap(t => [
                sb.from(t).select('*').eq('turno_token',shiftToken).maybeSingle(),
                sb.from(t).select('*').eq('turno_token',prevToken).maybeSingle(),
            ]);
            const results = await Promise.all(queries);
            if (results.some(r=>r.error)) throw new Error('Error en base de datos');

            const d = results.map(r=>r.data);
            const llaves = ['turno','gasometro','digestor','compresores','calderas','antorchas','area50','area60','area70','entrega','totalizadores','generador'];
            const prev = {};
            results.forEach((r,i)=>{ if(i%2===1) prev[llaves[Math.floor(i/2)]] = r.data; });

            setCurrentScada(d[0]);  setCurrentGas(d[2]);  setCurrentDig(d[4]);  setCurrentComp(d[6]);
            setCurrentCald(d[8]);   setCurrentAnt(d[10]); setCurrentA50(d[12]); setCurrentA60(d[14]);
            setCurrentA70(d[16]);   setCurrentEnt(d[18]); setCurrentTot(d[20]); setCurrentGen(d[22]);
            setPrevData(prev);
            if (!silencioso) toast('Datos sincronizados ✓','success');
        } catch(e) { toast('Error de sincronización','error'); } finally { setSyncInProgress(false); }
    }, [shiftToken, prevToken]);

    useEffect(() => {
        sb.auth.getSession().then(({data:{session}}) => {
            setUser(session?.user ?? null);
            setAuthChecking(false);
        });
    }, []);

    useEffect(() => { if(user) cargarDatos(true); }, [user]);

    if (authChecking) return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center">
            <div className="w-10 h-10 border-4 border-aguas-blue border-t-transparent rounded-full spin"></div>
        </div>
    );
    if (!user) return <PantallaLogin onLogin={u=>setUser(u)} />;

    // ---- Guardado genérico ----
    const guardarGenerico = async (tabla, current, payload) => {
        setIsSaving(true);
        try {
            const base = { turno_token:shiftToken, turno_id:currentScada?.id??null, operador_nombre:user.email, ...payload };
            const { error } = current?.id
                ? await sb.from(tabla).update(base).eq('id',current.id)
                : await sb.from(tabla).insert([base]);
            if (error) throw error;
            await cargarDatos(true);
            toast('Módulo sellado ✓','success');
            setVista('hub');
        } catch(e) { toast('Error guardando: '+e.message,'error'); } finally { setIsSaving(false); }
    };

    // ---- SCADA ----
    const handleSaveScada = async (vals, campos) => {
        setIsSaving(true);
        try {
            const payload = { turno_token:shiftToken, operador_nombre:user.email, tipo_turno:isNoche?'Noche':'Día', hora_inicio:currentScada?.hora_inicio??new Date().toISOString() };
            campos.forEach(c => { payload[c.dbKey] = vals[c.key]!=='' ? vals[c.key] : null; });
            const { error } = currentScada?.id
                ? await sb.from('registro_turnos').update(payload).eq('id',currentScada.id)
                : await sb.from('registro_turnos').insert([payload]);
            if (error) throw error;
            await cargarDatos(true); toast('SCADA sellado ✓','success'); setVista('hub');
        } catch(e) { toast('Error SCADA: '+e.message,'error'); } finally { setIsSaving(false); }
    };

    // ---- Handlers de módulos ----
    const handleSaveEnt  = d => guardarGenerico('inspeccion_entrega', currentEnt, { radios_ok:d.radios, llaves_ok:d.llaves, detector_ok:d.detector, linternas_ok:d.linternas, sacos_polimero_centrifuga:d.pol_cen||null, sacos_polimero_sedipack:d.pol_sedi||null, litros_petroleo:d.petroleo||null, sacos_cal_viva:d.cal||null, observaciones:d.observaciones });
    const handleSaveTot  = d => guardarGenerico('inspeccion_totalizadores', currentTot, { m3_lodos:d.lodos||null, m3_biogas:d.biogas||null, horometro_caldera1:d.hc1||null, horometro_caldera2:d.hc2||null, observaciones:d.observaciones });
    const handleSaveGen  = d => guardarGenerico('inspeccion_generador', currentGen, { nivel_inicio_pct:d.inicio||null, nivel_fin_pct:d.fin||null, prueba_ok:d.prueba_ok, observaciones:d.observaciones });
    const handleSaveGas  = (d,f) => guardarGenerico('inspeccion_gasometro', currentGas, { estado_anclajes:d.anclajes, altura_interna_m:d.altura||null, presion_inter_membrana_mbar:d.presion||null, lectura_lel_porcentaje:d.lel||null, nivel_guarda_hidraulica:d.guarda, soplador_1_estado:d.soplador_1, soplador_2_estado:d.soplador_2, sopladores_condicion_mecanica:d.condicion_sopladores, flujo_agua_trampa:d.agua_trampa, estado_valvula_corte:d.valvula_corte, estado_gabinete_electrico:d.gabinete, observaciones:d.observaciones, foto_anclaje:f.anclaje?.[0]||null, foto_altura:f.altura?.[0]||null, foto_presion:f.presion?.[0]||null, foto_lel:f.lel?.[0]||null, foto_guarda:f.guarda?.[0]||null, foto_sopladores:f.sopladores?.[0]||null, foto_trampa:f.trampa?.[0]||null, foto_gabinete:f.gabinete?.[0]||null });
    const handleSaveDig  = (d,f) => guardarGenerico('inspeccion_digestor', currentDig, { estado_escotillas:d.escotillas, estado_valvulas:d.valvulas, estado_purgas:d.purgas, estado_revestimiento:d.revestimiento, observaciones:d.observaciones, foto_escotillas:f.escotillas?.[0]||null, foto_valvulas:f.valvulas?.[0]||null, foto_purgas:f.purgas?.[0]||null, foto_revestimiento:f.revestimiento?.[0]||null });
    const handleSaveComp = (d,f) => guardarGenerico('inspeccion_compresores', currentComp, { estado_compresores:d.estado_gral, estado_filtros:d.filtros, estado_chiller:d.chiller, estado_valvulas:d.valvulas, estado_tablero:d.tablero, observaciones:d.observaciones, foto_compresores:f.general?.[0]||null, foto_filtros:f.filtros?.[0]||null, foto_chiller:f.chiller?.[0]||null, foto_valvulas:f.valvulas?.[0]||null, foto_tablero:f.tablero?.[0]||null });
    const handleSaveCald = (d,f) => guardarGenerico('inspeccion_calderas', currentCald, { estado_quemador:d.quemador, estado_circuito_agua:d.circuito, estado_bombas:d.bombas, estado_chimenea:d.chimenea, estado_tablero:d.tablero, observaciones:d.observaciones, foto_quemador:f.quemador?.[0]||null, foto_circuito_agua:f.circuito?.[0]||null, foto_bombas:f.bombas?.[0]||null, foto_chimenea:f.chimenea?.[0]||null, foto_tablero:f.tablero?.[0]||null });
    const handleSaveAnt  = (d,f) => guardarGenerico('inspeccion_antorchas', currentAnt, { estado_quemador:d.quemador, estado_valvulas:d.valvulas, nivel_glp_pct:d.nivel_glp||null, estado_tablero:d.tablero, observaciones:d.observaciones, foto_quemador:f.ant_quemador?.[0]||null, foto_valvulas:f.ant_valvulas?.[0]||null, foto_glp:f.ant_glp?.[0]||null, foto_tablero:f.ant_tablero?.[0]||null });
    const handleSaveA50  = (d,f) => guardarGenerico('inspeccion_area50', currentA50, { estado_rastras:d.rastras, altura_lodo_cm:d.altura||null, nivel_balon_cm:d.nivel||null, presion_balon_bar:d.presion||null, camara_mezcla_pct:d.mezcla||null, observaciones:d.observaciones, foto_flotador:f.a50_flotador?.[0]||null, foto_balon:f.a50_balon?.[0]||null });
    const handleSaveA60  = (d,f) => guardarGenerico('inspeccion_area60', currentA60, { temp_lodo_entrada_c:d.temp_in||null, temp_lodo_salida_c:d.temp_out||null, estado_bombas:d.bombas, observaciones:d.observaciones, foto_intercambiador:f.a60_inter?.[0]||null, foto_bombas:f.a60_bombas?.[0]||null });
    const handleSaveA70  = (d,f) => guardarGenerico('inspeccion_area70', currentA70, { centrifuga_activa:d.centrifuga, torque:d.torque||null, velocidad_relativa:d.vel_rel||null, nivel_polipack:d.polipack||null, estado_bombas_dosificadoras:d.bombas_dos, observaciones:d.observaciones, foto_centrifuga:f.a70_centrifuga?.[0]||null, foto_polipack:f.a70_polipack?.[0]||null });

    const handleCerrarTurno = async setpoints => {
        setIsSaving(true);
        try {
            if (!currentScada?.id) throw new Error('No hay turno activo.');
            const { error } = await sb.from('registro_turnos').update({ hora_fin:new Date().toISOString(), turno_cerrado:true, setpoints_ajustados:setpoints||null }).eq('id',currentScada.id);
            if (error) throw error;
            setVista('turno_cerrado');
        } catch(e) { toast('Error al cerrar turno: '+e.message,'error'); } finally { setIsSaving(false); }
    };

    const Loader = () => (
        <div className="fixed inset-0 bg-aguas-dark/90 z-50 flex flex-col items-center justify-center text-white backdrop-blur-sm">
            <div className="text-4xl spin mb-6">⚙️</div>
            <h2 className="font-black tracking-[0.25em] uppercase text-sm">Guardando Evidencia...</h2>
        </div>
    );

    // ---- Flags de completitud ----
    const scadaDone=!!currentScada, gasDone=!!currentGas, digDone=!!currentDig, compDone=!!currentComp;
    const caldDone=!!currentCald,  antDone=!!currentAnt,  a50Done=!!currentA50,  a60Done=!!currentA60;
    const a70Done=!!currentA70,    entDone=!!currentEnt,  totDone=!!currentTot,  genDone=!!currentGen;

    let requeridos = [scadaDone,entDone,gasDone,digDone,compDone,caldDone,antDone,a50Done,a60Done,a70Done];
    if (isNoche)        requeridos.push(totDone);
    if (isMiercolesDia) requeridos.push(genDone);
    const completados  = requeridos.filter(Boolean).length;
    const totalReq     = requeridos.length;
    const todosCompletos = completados === totalReq;

    // ---- Rutas ----
    if (vista==='turno_cerrado') return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
            <div className="bg-white p-8 rounded-3xl text-center shadow-xl border-t-8 border-aguas-green fade-in max-w-sm w-full">
                <div className="text-5xl mb-4">🎉</div>
                <h2 className="text-xl font-black text-aguas-dark mb-2 uppercase">Turno Cerrado</h2>
                <p className="text-sm text-gray-400 mb-6">El turno ha sido sellado y registrado correctamente.</p>
                <button onClick={async()=>{ await sb.auth.signOut(); setUser(null); setVista('hub'); }}
                    className="bg-aguas-blue text-white px-8 py-4 rounded-xl font-black uppercase tracking-widest w-full hover:bg-aguas-dark transition-colors text-sm">
                    Cerrar Sesión
                </button>
            </div>
        </div>
    );

    if (vista==='traspaso')      return <VistaTraspaso prevTurno={prevData.turno} prevGasometro={prevData.gasometro} prevDigestor={prevData.digestor} prevCompresores={prevData.compresores} prevCalderas={prevData.calderas} prevAntorchas={prevData.antorchas} prevA50={prevData.area50} prevA60={prevData.area60} prevA70={prevData.area70} onBack={()=>setVista('hub')} />;
    if (vista==='scada')         return <>{isSaving&&<Loader/>}<VistaScada datosGuardados={currentScada} prevData={prevData.turno} onSave={handleSaveScada} onBack={()=>setVista('hub')} /></>;
    if (vista==='riesgos')       return <VistaRiesgos modulo={moduloDestino} onComplete={()=>setVista(moduloDestino)} onBack={()=>setVista('hub')} />;
    if (vista==='entrega')       return <>{isSaving&&<Loader/>}<FormularioEntrega       onTerminado={handleSaveEnt}  prevData={prevData.entrega} /></>;
    if (vista==='totalizadores') return <>{isSaving&&<Loader/>}<FormularioTotalizadores onTerminado={handleSaveTot}  prevData={prevData.totalizadores} /></>;
    if (vista==='generador')     return <>{isSaving&&<Loader/>}<FormularioGenerador     onTerminado={handleSaveGen}  prevData={prevData.generador} /></>;
    if (vista==='gasometro')     return <>{isSaving&&<Loader/>}<FormularioGasometro     turnoId={shiftToken} prevData={prevData.gasometro}   onTerminado={handleSaveGas} /></>;
    if (vista==='digestor')      return <>{isSaving&&<Loader/>}<FormularioDigestor      turnoId={shiftToken} prevData={prevData.digestor}    onTerminado={handleSaveDig} /></>;
    if (vista==='compresores')   return <>{isSaving&&<Loader/>}<FormularioCompresores   turnoId={shiftToken} prevData={prevData.compresores} onTerminado={handleSaveComp} /></>;
    if (vista==='calderas')      return <>{isSaving&&<Loader/>}<FormularioCalderas      turnoId={shiftToken} prevData={prevData.calderas}    onTerminado={handleSaveCald} /></>;
    if (vista==='antorchas')     return <>{isSaving&&<Loader/>}<FormularioAntorchas     turnoId={shiftToken} prevData={prevData.antorchas}   onTerminado={handleSaveAnt} /></>;
    if (vista==='area50')        return <>{isSaving&&<Loader/>}<FormularioArea50        turnoId={shiftToken} prevData={prevData.area50}      onTerminado={handleSaveA50} /></>;
    if (vista==='area60')        return <>{isSaving&&<Loader/>}<FormularioArea60        turnoId={shiftToken} prevData={prevData.area60}      onTerminado={handleSaveA60} /></>;
    if (vista==='area70')        return <>{isSaving&&<Loader/>}<FormularioArea70        turnoId={shiftToken} prevData={prevData.area70}      onTerminado={handleSaveA70} /></>;
    if (vista==='resumen_final') return <VistaResumenFinal shiftToken={shiftToken} user={user} allData={{scada:scadaDone,ent:entDone,gas:gasDone,dig:digDone,comp:compDone,cald:caldDone,ant:antDone,a50:a50Done,a60:a60Done,a70:a70Done}} onConfirm={handleCerrarTurno} onBack={()=>setVista('hub')} isSaving={isSaving} />;

    // ─── HUB ───────────────────────────────────
    const urlDigestor    = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Digestor.jpg";
    const urlGasometro   = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Gasometro%20vista%20general.jpeg";
    const urlCompresores = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Compresores.jpg";
    const urlCalderas    = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Sala%20de%20Calderas.jpg";
    const urlAntorchas   = "https://cbvipsjpvlgyipifidyo.supabase.co/storage/v1/object/public/inspeccion_fotos/Antorchas.jpeg";

    const ModuloCard = ({ label, done, onClick, img, icono='', className='' }) => (
        <button onClick={onClick} className={`p-2 rounded-3xl border-2 transition-all text-left relative shadow-sm active:scale-95 ${done?'bg-emerald-50 border-aguas-green':'bg-white border-gray-200 hover:border-aguas-blue hover:shadow-md'} ${className}`}>
            {done && <div className="absolute top-3 right-3 z-10 bg-aguas-green text-white rounded-full h-8 w-8 flex items-center justify-center shadow-lg border-2 border-white font-black text-sm">✓</div>}
            <div className="h-28 w-full rounded-2xl overflow-hidden mb-2 bg-gradient-to-br from-aguas-blue/20 to-aguas-dark/30 flex items-center justify-center">
                {img ? <img src={img} className="w-full h-full object-cover" alt={label} loading="lazy" /> : <span className="text-4xl opacity-40">{icono}</span>}
            </div>
            <span className={`font-black text-xs px-2 uppercase tracking-wide ${done?'text-aguas-green':'text-gray-700'}`}>{label}</span>
        </button>
    );

    const navTo = mod => { setModuloDestino(mod); setVista('riesgos'); };

    return (
        <div className="p-4 max-w-md mx-auto min-h-screen space-y-5 bg-slate-100 pb-10 fade-in">
            <ToastContainer />

            {/* Header */}
            <div className="bg-white p-5 rounded-3xl border-t-[10px] border-aguas-blue shadow-lg">
                <div className="flex justify-between items-start border-b border-gray-100 pb-4 mb-4">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-aguas-blue rounded-xl flex items-center justify-center shadow-md">
                            <span className="font-black text-white text-sm">RS</span>
                        </div>
                        <div>
                            <h1 className="text-xl font-black text-aguas-dark">RondaSync</h1>
                            <p className="text-[10px] text-aguas-green font-bold uppercase tracking-widest">{shiftToken}</p>
                        </div>
                    </div>
                    <button onClick={async()=>{ await sb.auth.signOut(); setUser(null); }}
                        className="text-[10px] font-black bg-red-50 text-red-600 px-4 py-2 rounded-xl border border-red-100 hover:bg-red-100 transition-all">
                        SALIR
                    </button>
                </div>
                <div className="flex justify-between items-center">
                    <div>
                        <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-1">Operador</p>
                        <p className="text-sm font-bold text-gray-800 truncate max-w-[160px]">{user.email.split('@')[0]}</p>
                    </div>
                    <button onClick={()=>cargarDatos(false)} disabled={syncInProgress}
                        className="bg-aguas-blue hover:bg-aguas-dark disabled:opacity-60 text-white px-4 py-2 rounded-xl text-[10px] font-black flex items-center gap-2 shadow-md active:scale-95 transition-all">
                        <span className={syncInProgress?'spin':''}>🔄</span>
                        {syncInProgress?'Sync...':'Sincronizar'}
                    </button>
                </div>
            </div>

            {/* Accesos principales */}
            <div className="space-y-3">
                <button onClick={()=>setVista('traspaso')} className="w-full flex justify-between items-center p-5 rounded-2xl border-2 bg-white border-aguas-yellow hover:border-amber-400 transition-all shadow-sm active:scale-95">
                    <div className="flex items-center gap-4"><span className="text-2xl">📋</span><span className="font-black text-sm uppercase text-gray-800">Traspaso de Turno</span></div>
                    <span className="text-[10px] bg-aguas-yellow text-amber-900 px-3 py-1 rounded-lg font-black uppercase">Leer</span>
                </button>
            </div>

            {/* Módulos de turno fijos */}
            <div>
                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-3 mt-2 border-b border-gray-200 pb-2">Módulos del Turno</h3>
                <div className="space-y-3">
                    {[
                        { id:'scada', icon: scadaDone?'🔒':'🖥️', label:'SCADA Inicial', done:scadaDone, color:'border-gray-200 hover:border-aguas-blue', doneColor:'border-aguas-green bg-emerald-50', tag:'Llenar', tagColor:'bg-blue-100 text-blue-800' },
                        { id:'entrega', icon:'📦', label:'Stock y Entregas', done:entDone, color:'border-gray-200 hover:border-indigo-400', doneColor:'border-aguas-green bg-emerald-50', tag:'Llenar', tagColor:'bg-indigo-100 text-indigo-800' },
                    ].map(item => (
                        <button key={item.id} onClick={()=>setVista(item.id)}
                            className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all shadow-sm active:scale-95 ${item.done ? item.doneColor : 'bg-white '+item.color}`}>
                            <div className="flex items-center gap-4">
                                <span className="text-2xl">{item.icon}</span>
                                <span className={`font-black text-sm uppercase ${item.done?'text-aguas-green':'text-gray-800'}`}>{item.label}</span>
                            </div>
                            <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${item.done?'bg-emerald-100 text-emerald-800':item.tagColor}`}>{item.done?'Ver':item.tag}</span>
                        </button>
                    ))}
                </div>
            </div>

            {/* Tareas especiales */}
            {(isNoche || isMiercolesDia) && (
                <div>
                    <h3 className="text-[10px] font-black text-orange-500 uppercase tracking-widest px-1 mb-3 border-b border-orange-200 pb-2">Tareas Especiales</h3>
                    <div className="space-y-3">
                        {isNoche && (
                            <button onClick={()=>setVista('totalizadores')}
                                className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all shadow-sm active:scale-95 ${totDone?'bg-emerald-50 border-aguas-green':'bg-white border-fuchsia-300 hover:border-fuchsia-500'}`}>
                                <div className="flex items-center gap-4"><span className="text-2xl">⏱️</span><span className={`font-black text-sm uppercase ${totDone?'text-aguas-green':'text-fuchsia-800'}`}>Totalizadores (00:30)</span></div>
                                <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${totDone?'bg-emerald-100 text-emerald-800':'bg-fuchsia-100 text-fuchsia-800'}`}>{totDone?'Ver':'Llenar'}</span>
                            </button>
                        )}
                        {isMiercolesDia && (
                            <button onClick={()=>setVista('generador')}
                                className={`w-full flex justify-between items-center p-5 rounded-2xl border-2 transition-all shadow-sm active:scale-95 ${genDone?'bg-emerald-50 border-aguas-green':'bg-white border-orange-300 hover:border-orange-500'}`}>
                                <div className="flex items-center gap-4"><span className="text-2xl">⚡</span><span className={`font-black text-sm uppercase ${genDone?'text-aguas-green':'text-orange-800'}`}>Prueba Generador</span></div>
                                <span className={`text-[10px] font-black uppercase px-3 py-1 rounded-lg ${genDone?'bg-emerald-100 text-emerald-800':'bg-orange-100 text-orange-800'}`}>{genDone?'Ver':'Llenar'}</span>
                            </button>
                        )}
                    </div>
                </div>
            )}

            {/* Biogás */}
            <div>
                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-3 border-b border-gray-200 pb-2">Circuito de Biogás</h3>
                <div className="grid grid-cols-2 gap-4">
                    <ModuloCard label="Digestor"        done={digDone}  onClick={()=>navTo('digestor')}    img={urlDigestor}   />
                    <ModuloCard label="Gasómetro"       done={gasDone}  onClick={()=>navTo('gasometro')}   img={urlGasometro}  />
                    <ModuloCard label="Compresores"     done={compDone} onClick={()=>navTo('compresores')} img={urlCompresores}/>
                    <ModuloCard label="Calderas"        done={caldDone} onClick={()=>navTo('calderas')}    img={urlCalderas}   />
                    <ModuloCard label="Antorchas y GLP" done={antDone}  onClick={()=>navTo('antorchas')}   img={urlAntorchas}  className="col-span-2" />
                </div>
            </div>

            {/* Lodos */}
            <div>
                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest px-1 mb-3 border-b border-gray-200 pb-2">Línea de Lodos</h3>
                <div className="grid grid-cols-2 gap-4">
                    <ModuloCard label="Área 50" done={a50Done} onClick={()=>navTo('area50')} icono="🌊" />
                    <ModuloCard label="Área 60" done={a60Done} onClick={()=>navTo('area60')} icono="🌡️" />
                    <ModuloCard label="Área 70" done={a70Done} onClick={()=>navTo('area70')} icono="⚙️" className="col-span-2" />
                </div>
            </div>

            {/* Barra de progreso */}
            <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
                <div className="flex justify-between items-center mb-2">
                    <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Progreso del Turno</p>
                    <p className="text-[10px] font-black text-aguas-blue">{completados} / {totalReq}</p>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden">
                    <div className="bg-aguas-green h-2.5 rounded-full transition-all duration-700" style={{width:`${completados/totalReq*100}%`}}></div>
                </div>
            </div>

            {/* Cierre de turno */}
            {todosCompletos && (
                <button onClick={()=>setVista('resumen_final')}
                    className="w-full bg-aguas-dark text-white font-black py-5 rounded-3xl shadow-2xl uppercase tracking-[0.2em] hover:bg-black active:scale-95 transition-all text-sm">
                    Revisar y Cerrar Turno
                </button>
            )}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
